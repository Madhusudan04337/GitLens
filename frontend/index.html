<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator | Premium Developer Identity</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Script Dependencies (React 18 Production) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            overflow-x: hidden;
            margin: 0;
            color: #e2e8f0;
        }

        .bg-gradient-main {
            background: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-glow {
            animation: glow 4s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
            to { box-shadow: 0 0 40px rgba(168, 85, 247, 0.3); }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-overlay {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="bg-gradient-main min-h-screen selection:bg-blue-500/30">
    <div class="fixed inset-0 grid-overlay pointer-events-none"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

    <div id="root" class="relative z-10 flex items-center justify-center min-h-screen text-gray-500 font-mono text-sm">
        <div id="loader-content">
            Initializing Premium Experience...
            <div id="debug-info" class="mt-4 text-[10px] opacity-40 text-center">Checking libraries...</div>
        </div>
    </div>

    <script>
        // Use pure JavaScript (no Babel/JSX) for maximum reliability
        (function() {
            const e = React.createElement;
            window.BACKEND_URL = '__BACKEND_URL__';

            // Verify libraries are loaded
            const debugEl = document.getElementById('debug-info');
            if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
                debugEl.innerHTML = '<span class="text-red-500">Error: React libraries failed to load from CDN.</span>';
                return;
            }
            debugEl.innerText = "Libraries loaded. Starting application...";

            const App = () => {
                const [username, setUsername] = React.useState('');
                const [loading, setLoading] = React.useState(false);
                const [cardUrl, setCardUrl] = React.useState(null);
                const [error, setError] = React.useState(null);
                const [toast, setToast] = React.useState(null);

                const handleGenerate = async (ev) => {
                    if (ev) ev.preventDefault();
                    if (!username.trim()) return;

                    setLoading(true);
                    setError(null);
                    setCardUrl(null);

                    try {
                        const baseUrl = window.BACKEND_URL && !window.BACKEND_URL.includes('__BACKEND_URL') ? window.BACKEND_URL : '';
                        const response = await fetch(`${baseUrl}/generate`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.trim() })
                        });

                        const data = await response.json();
                        if (!response.ok) throw new Error(data.detail || 'Profile not found');
                        
                        let finalUrl = data.card_url;
                        if (finalUrl.startsWith('/') && baseUrl) finalUrl = baseUrl + finalUrl;
                        setCardUrl(finalUrl);
                    } catch (err) {
                        setError(err.message || 'API connection error.');
                    } finally {
                        setLoading(false);
                    }
                };

                const copyLink = () => {
                    const fullUrl = cardUrl.startsWith('http') ? cardUrl : window.location.origin + cardUrl;
                    navigator.clipboard.writeText(fullUrl);
                    setToast('Link copied!');
                    setTimeout(() => setToast(null), 3000);
                };

                // Icons
                const GithubIcon = e('svg', { width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, className: "text-gray-500" }, 
                    e('path', { d: "M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" }),
                    e('path', { d: "M9 18c-4.51 2-5-2-7-2" })
                );

                const AlertIcon = e('svg', { width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, className: "mr-2" }, 
                    e('circle', { cx: 12, cy: 12, r: 10 }),
                    e('line', { x1: 12, y1: 8, x2: 12, y2: 12 }),
                    e('line', { x1: 12, y1: 16, x2: 12.01, y2: 16 })
                );

                return e('main', { className: "relative z-10 flex flex-col items-center justify-center min-h-screen p-6" },
                    // Hero
                    e('div', { className: "text-center mt-16 mb-12 fade-in-up" },
                        e('h1', { className: "text-4xl md:text-6xl font-extrabold mb-4 tracking-tight text-white" }, 
                            "GitHub ", e('span', { className: "text-gradient" }, "Dev Card"), " Generator"
                        ),
                        e('p', { className: "text-gray-400 text-lg md:text-xl max-w-xl mx-auto font-light" }, 
                            "Transform your GitHub presence into a premium, shareable identity card powered by AI."
                        )
                    ),
                    // Search
                    e('div', { className: "w-full max-w-[720px] mb-12 fade-in-up" },
                        e('form', { onSubmit: handleGenerate, className: "glass p-2 rounded-2xl flex flex-col md:flex-row gap-3 animate-glow" },
                            e('div', { className: "relative flex-grow group flex items-center" },
                                e('div', { className: "absolute left-4" }, GithubIcon),
                                e('input', { 
                                    type: "text", 
                                    placeholder: "Enter GitHub username",
                                    className: "w-full bg-transparent border-none py-4 pl-12 pr-4 text-white focus:outline-none text-lg",
                                    value: username,
                                    onChange: (el) => setUsername(el.target.value),
                                    disabled: loading
                                })
                            ),
                            e('button', {
                                type: "submit",
                                disabled: loading || !username,
                                className: "bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-semibold py-4 px-8 rounded-xl transition-all disabled:opacity-50"
                            }, loading ? "Generating..." : "Generate Card")
                        )
                    ),
                    // Error
                    error && e('div', { className: "w-full max-w-md p-4 mb-12 glass border-red-500/30 text-red-400 rounded-xl text-center fade-in-up flex items-center justify-center" }, 
                        AlertIcon, e('span', null, error)
                    ),
                    // Showcase
                    e('section', { className: "w-full max-w-[960px] min-h-[500px] flex items-center justify-center relative" },
                        loading ? e('div', { className: "w-full h-[450px] glass rounded-[3rem] shimmer" }) :
                        cardUrl ? e('div', { className: "w-full fade-in-up" },
                            e('div', { className: "md:p-1.5 md:rounded-[3.5rem] overflow-hidden mb-10 relative md:glass md:bg-black/40" },
                                e('iframe', { src: cardUrl, className: "w-full h-[620px] border-none md:rounded-[2.5rem] bg-transparent" })
                            ),
                            e('div', { className: "flex justify-center" },
                                e('button', { onClick: copyLink, className: "glass hover:bg-white/10 text-white font-bold py-4 px-10 rounded-2xl transition-all" }, "Copy Link")
                            )
                        ) : e('div', { className: "text-gray-600 italic text-center opacity-50" }, "Your premium identity is just one username away.")
                    ),
                    // Toast
                    toast && e('div', { className: "fixed bottom-8 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full text-white text-sm font-medium fade-in-up" }, toast)
                );
            };

            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(e(App));
            } catch (err) {
                console.error("Mount error:", err);
                debugEl.innerHTML = '<span class="text-red-500">Failed to render app. Check console.</span>';
            }
        })();
    </script>
</body>
</html>
