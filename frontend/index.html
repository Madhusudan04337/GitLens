<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator | Premium Developer Identity</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Script Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            overflow-x: hidden;
        }

        .bg-gradient-main {
            background: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .animate-glow {
            animation: glow 4s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
            to { box-shadow: 0 0 40px rgba(168, 85, 247, 0.3); }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-overlay {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
</head>
<body class="bg-gradient-main min-h-screen text-gray-200 selection:bg-blue-500/30">
    <!-- Background elements -->
    <div class="fixed inset-0 grid-overlay pointer-events-none"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [username, setUsername] = useState('');
            const [loading, setLoading] = useState(false);
            const [cardUrl, setCardUrl] = useState(null);
            const [error, setError] = useState(null);
            const [toast, setToast] = useState(null);

            const handleGenerate = async (e) => {
                if (e) e.preventDefault();
                if (!username.trim()) return;

                setLoading(true);
                setError(null);
                setCardUrl(null);

                try {
                    const response = await fetch('http://localhost:8080/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username.trim() })
                    });

                    if (!response.ok) throw new Error('Profile not found');
                    
                    const data = await response.json();
                    setCardUrl(data.card_url);
                } catch (err) {
                    setError('Oops! GitHub profile not found or API error.');
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = () => {
                const fullUrl = `${window.location.origin}${cardUrl}`;
                navigator.clipboard.writeText(fullUrl);
                setToast('Link copied to clipboard!');
                setTimeout(() => setToast(null), 3000);
            };

            return (
                <main class="relative z-10 flex flex-col items-center justify-center min-h-screen p-6">
                    {/* Hero Section */}
                    <div class="text-center mb-12 fade-in-up">
                        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight">
                            GitHub <span class="text-gradient">Dev Card</span> Generator
                        </h1>
                        <p class="text-gray-400 text-lg md:text-xl max-w-xl mx-auto font-light">
                            Transform your GitHub presence into a premium, shareable identity card powered by AI.
                        </p>
                    </div>

                    {/* Search Container */}
                    <div class="w-full max-w-[720px] mb-12 fade-in-up" style="animation-delay: 0.1s">
                        <form onSubmit={handleGenerate} class="glass p-2 rounded-2xl flex flex-col md:flex-row gap-3 animate-glow">
                            <div class="relative flex-grow group">
                                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-blue-400 transition-colors">
                                    <i data-lucide="github" class="w-5 h-5"></i>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="Enter GitHub username (e.g. torvalds)" 
                                    class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-white focus:ring-0 placeholder-gray-600 transition-all text-lg"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    disabled={loading}
                                />
                            </div>
                            <button 
                                type="submit"
                                disabled={loading || !username}
                                class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-semibold py-4 px-8 rounded-xl transition-all duration-300 transform hover:scale-[1.02] hover:-translate-y-1 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20"
                            >
                                {loading ? (
                                    <span class="flex items-center gap-2">
                                        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                        Generating...
                                    </span>
                                ) : (
                                    <>Generate Card</>
                                )}
                            </button>
                        </form>
                    </div>

                    {/* Error State */}
                    {error && (
                        <div class="w-full max-w-md p-4 mb-12 glass border-red-500/30 text-red-400 rounded-xl text-center fade-in-up shadow-[0_0_20px_rgba(239,68,68,0.1)]">
                            <div class="flex items-center justify-center gap-2">
                                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                                <span>{error}</span>
                            </div>
                        </div>
                    )}

                    {/* Content Showcase */}
                    <section class="w-full max-w-[720px] min-h-[400px] flex items-center justify-center relative">
                        {loading ? (
                            <div class="w-full space-y-4 fade-in-up">
                                <div class="w-full h-[350px] glass rounded-2xl shimmer overflow-hidden relative">
                                    <div class="absolute inset-0 flex flex-col items-center justify-center gap-4">
                                        <div class="w-24 h-24 rounded-full bg-white/5 shimmer"></div>
                                        <div class="w-48 h-6 rounded bg-white/5 shimmer"></div>
                                        <div class="w-64 h-4 rounded bg-white/5 shimmer"></div>
                                    </div>
                                </div>
                            </div>
                        ) : cardUrl ? (
                            <div class="w-full fade-in-up">
                                <div class="glass p-4 rounded-3xl shadow-2xl overflow-hidden mb-6 relative group">
                                    <iframe 
                                        src={`http://localhost:8080${cardUrl}`} 
                                        class="w-full h-[550px] border-none rounded-2xl bg-transparent"
                                        title="Dev Card"
                                    ></iframe>
                                    <div class="absolute inset-0 pointer-events-none border-2 border-white/5 rounded-3xl transition-opacity group-hover:opacity-100"></div>
                                </div>
                                <div class="flex justify-center gap-4">
                                    <button 
                                        onClick={copyToClipboard}
                                        class="glass hover:bg-white/10 text-white font-medium py-3 px-6 rounded-xl transition-all flex items-center gap-2"
                                    >
                                        <i data-lucide="copy" class="w-4 h-4"></i>
                                        Copy Share Link
                                    </button>
                                    <a 
                                        href={`http://localhost:8080${cardUrl}`} 
                                        target="_blank"
                                        class="glass hover:bg-white/10 text-white font-medium py-3 px-6 rounded-xl transition-all flex items-center gap-2"
                                    >
                                        <i data-lucide="external-link" class="w-4 h-4"></i>
                                        View Full
                                    </a>
                                </div>
                            </div>
                        ) : (
                            <div class="text-gray-600 italic text-center opacity-50 flex flex-col items-center gap-4">
                                <i data-lucide="sparkles" class="w-12 h-12 animate-float"></i>
                                <p>Your premium identity is just one username away.</p>
                            </div>
                        )}
                    </section>

                    {/* Toast Notification */}
                    {toast && (
                        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full text-white text-sm font-medium fade-in-up shadow-xl border-blue-500/30 flex items-center gap-2">
                            <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
                            {toast}
                        </div>
                    )}

                    {/* Floating Decorative Elements */}
                    <div class="absolute top-1/4 left-10 w-2 h-2 bg-blue-500 rounded-full blur-[2px] animate-float opacity-50"></div>
                    <div class="absolute top-1/3 right-20 w-3 h-3 bg-purple-500 rounded-full blur-[2px] animate-float opacity-30" style="animation-delay: 1s"></div>
                    <div class="absolute bottom-1/4 left-20 w-4 h-4 bg-pink-500 rounded-full blur-[3px] animate-float opacity-20" style="animation-delay: 2s"></div>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
